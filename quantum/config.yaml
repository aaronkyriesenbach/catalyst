server:
  cacheDir: /tmp
  database: /database/database.db
  sources:
    - path: "/data"
      config:
        defaultEnabled: true

auth:
  signup: false
  methods:
    proxy:
      enabled: true
      header: "Remote-User"
      createUser: true

userDefaults:
  darkMode: true

integrations:
  office:
    url: https://onlyoffice.lab53.net
