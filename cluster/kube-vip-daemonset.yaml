# To be placed in /var/lib/rancher/k3s/server/manifests on all server nodes.
# Provides a floating VIP for both the control plane (API server) and services (Traefik LoadBalancer).

apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: kube-vip
  namespace: kube-system
  labels:
    app.kubernetes.io/name: kube-vip
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: kube-vip
  template:
    metadata:
      labels:
        app.kubernetes.io/name: kube-vip
    spec:
      serviceAccountName: kube-vip
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: node-role.kubernetes.io/master
                    operator: Exists
              - matchExpressions:
                  - key: node-role.kubernetes.io/control-plane
                    operator: Exists
      tolerations:
        - effect: NoSchedule
          operator: Exists
        - effect: NoExecute
          operator: Exists
      hostNetwork: true
      containers:
        - name: kube-vip
          image: ghcr.io/kube-vip/kube-vip:v1.1.2
          imagePullPolicy: IfNotPresent
          args:
            - manager
          env:
            # ARP mode — Layer 2 VIP advertisement
            - name: vip_arp
              value: "true"
            # Network interface for ARP announcements
            - name: vip_interface
              value: eth0
            # Control plane VIP address
            - name: address
              value: 192.168.53.200
            - name: port
              value: "6443"
            - name: vip_subnet
              value: "32"
            # Enable control plane VIP (API server HA)
            - name: cp_enable
              value: "true"
            - name: cp_namespace
              value: kube-system
            # Enable service VIP (LoadBalancer type services)
            - name: svc_enable
              value: "true"
            # Leader election — only one node holds the VIP at a time
            - name: vip_leaderelection
              value: "true"
            - name: vip_leasename
              value: plndr-cp-lock
            - name: vip_leaseduration
              value: "5"
            - name: vip_renewdeadline
              value: "3"
            - name: vip_retryperiod
              value: "1"
            # Disable DDNS — we manage DNS via external-dns
            - name: vip_ddns
              value: "false"
          securityContext:
            capabilities:
              add:
                - NET_ADMIN
                - NET_RAW
